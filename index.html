<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실전 병원 키오스크 체험</title>
    <style>
        /* 기본 리셋 및 폰트 설정 */
        * { box-sizing: border-box; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        body {
            margin: 0; padding: 0;
            background-color: #e2e8f0; /* 병원 특유의 안정적인 회색조 배경 */
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            user-select: none; /* 터치 기기에서 텍스트 선택 방지 */
        }

        /* 태블릿 화면 컨테이너 (16:10 비율 권장) */
        #kiosk-container {
            width: 100%; height: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        /* 상단 헤더 (병원 로고 및 안내) */
        header {
            background-color: #1e3a8a; /* 신뢰감을 주는 짙은 파란색 */
            color: white;
            padding: 30px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* 하단 처음으로 버튼 (항상 고정) */
        .home-btn-container {
            position: absolute;
            bottom: 30px; right: 30px;
            z-index: 100;
        }
        .home-btn {
            background-color: #4a5568; color: white;
            border: none; border-radius: 10px;
            padding: 20px 40px; font-size: 1.8rem;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .home-btn:active { background-color: #2d3748; }

        /* 화면 공통 스타일 */
        .screen {
            flex: 1;
            display: none; /* 기본적으로 숨김 */
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .screen.active { display: flex; } /* 활성화 시 보임 */

        h2.title {
            font-size: 3rem; color: #2d3748;
            margin-top: 0; margin-bottom: 50px; text-align: center;
        }

        /* --- 화면별 세부 스타일 --- */
        
        /* 1. 메인 화면 */
        .main-btn-group {
            display: flex; gap: 40px; width: 80%; height: 50%;
        }
        .main-btn {
            flex: 1; border: none; border-radius: 20px;
            font-size: 4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .main-btn:active { transform: translateY(5px); }
        .btn-register { background-color: #3b82f6; color: white; } /* 접수: 파란색 */
        .btn-payment { background-color: #10b981; color: white; } /* 수납: 초록색 */

        /* 2. 주민번호 입력 화면 */
        .input-display {
            font-size: 4rem; letter-spacing: 10px; font-weight: bold;
            background: #edf2f7; padding: 30px 50px;
            border-radius: 15px; margin-bottom: 40px;
            min-width: 600px; text-align: center;
            border: 3px solid #cbd5e0; color: #1a202c;
        }
        .keypad {
            display: grid; grid-template-columns: repeat(3, 140px); gap: 20px;
        }
        .key-btn {
            padding: 30px; font-size: 2.5rem; font-weight: bold;
            background: white; border: 2px solid #e2e8f0; border-radius: 15px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .key-btn:active { background: #e2e8f0; }
        .key-btn.action-del { background: #ef4444; color: white; border-color: #ef4444; }
        .key-btn.action-ok { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* 3. 진료과 선택 화면 */
        .dept-grid {
            display: grid; grid-template-columns: repeat(2, 300px); gap: 30px;
        }
        .dept-btn {
            padding: 50px 20px; font-size: 2.5rem; font-weight: bold;
            background: white; border: 4px solid #3b82f6; color: #3b82f6;
            border-radius: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dept-btn:active { background: #3b82f6; color: white; }

        /* 4. 수납 화면 */
        .bill-box {
            background: white; border: 3px solid #cbd5e0; border-radius: 15px;
            width: 80%; max-width: 600px; padding: 40px; font-size: 2rem;
            margin-bottom: 40px;
        }
        .bill-row {
            display: flex; justify-content: space-between; margin-bottom: 20px;
            border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px;
        }
        .bill-total {
            display: flex; justify-content: space-between;
            font-size: 3rem; font-weight: bold; color: #e53e3e; margin-top: 30px;
        }
        .pay-action-btn {
            background-color: #10b981; color: white; font-size: 3rem; font-weight: bold;
            padding: 30px 80px; border: none; border-radius: 15px; cursor: pointer;
        }

        /* 5. 카드 삽입 대기 모달 */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: white; padding: 60px; border-radius: 20px;
            text-align: center;
        }
        .card-insert-ani {
            font-size: 8rem; margin: 30px 0; color: #3b82f6;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        /* 6. 완료 화면 (영수증/접수증) */
        .receipt {
            background: white; border: 2px solid #ccc; padding: 50px;
            width: 60%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .wait-number { font-size: 6rem; font-weight: bold; color: #3b82f6; margin: 20px 0; }
        .print-msg { font-size: 2rem; color: #e53e3e; font-weight: bold; margin-top: 30px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

<div id="kiosk-container">
    <header>한국대학교병원 무인 키오스크</header>

    <!-- 우하단 처음으로 버튼 (메인 화면 외에만 표시됨) -->
    <div class="home-btn-container" id="homeBtnContainer" style="display: none;">
        <button class="home-btn" onclick="goHome()">처음으로</button>
    </div>

    <!-- 1. 메인 화면 -->
    <div id="screen-home" class="screen active" style="justify-content: center;">
        <h2 class="title" style="margin-bottom: 80px;">원하시는 업무를 선택해 주세요</h2>
        <div class="main-btn-group">
            <button class="main-btn btn-register" onclick="startFlow('접수')">
                <span>📋</span>
                <span style="margin-top: 20px;">진료 접수</span>
            </button>
            <button class="main-btn btn-payment" onclick="startFlow('수납')">
                <span>💳</span>
                <span style="margin-top: 20px;">수납 / 처방전</span>
            </button>
        </div>
    </div>

    <!-- 2. 주민번호 입력 화면 -->
    <div id="screen-ssn" class="screen">
        <h2 class="title">환자분의 <span style="color: #3b82f6;">주민등록번호</span>를 입력해 주세요</h2>
        <div id="ssnDisplay" class="input-display">_ _ _ _ _ _ - _ * * * * * *</div>
        <div class="keypad">
            <button class="key-btn" onclick="inputNumber(1)">1</button>
            <button class="key-btn" onclick="inputNumber(2)">2</button>
            <button class="key-btn" onclick="inputNumber(3)">3</button>
            <button class="key-btn" onclick="inputNumber(4)">4</button>
            <button class="key-btn" onclick="inputNumber(5)">5</button>
            <button class="key-btn" onclick="inputNumber(6)">6</button>
            <button class="key-btn" onclick="inputNumber(7)">7</button>
            <button class="key-btn" onclick="inputNumber(8)">8</button>
            <button class="key-btn" onclick="inputNumber(9)">9</button>
            <button class="key-btn action-del" onclick="deleteNumber()">지움</button>
            <button class="key-btn" onclick="inputNumber(0)">0</button>
            <button class="key-btn action-ok" onclick="submitSsn()">확인</button>
        </div>
    </div>

    <!-- 3. 진료과 선택 화면 (접수용) -->
    <div id="screen-dept" class="screen">
        <h2 class="title">접수하실 <span style="color: #3b82f6;">진료과</span>를 선택해 주세요</h2>
        <div class="dept-grid">
            <button class="dept-btn" onclick="completeRegistration('내과')">내과</button>
            <button class="dept-btn" onclick="completeRegistration('정형외과')">정형외과</button>
            <button class="dept-btn" onclick="completeRegistration('안과')">안과</button>
            <button class="dept-btn" onclick="completeRegistration('이비인후과')">이비인후과</button>
        </div>
    </div>

    <!-- 4. 수납 내역 확인 화면 (수납용) -->
    <div id="screen-payment" class="screen">
        <h2 class="title">수납하실 내역을 확인해 주세요</h2>
        <div class="bill-box">
            <div class="bill-row"><span>환자명</span><span>홍길동 님</span></div>
            <div class="bill-row"><span>진료과</span><span>내과</span></div>
            <div class="bill-row"><span>진찰료</span><span>12,500 원</span></div>
            <div class="bill-row"><span>검사료</span><span>25,000 원</span></div>
            <div class="bill-total"><span>총 결제금액</span><span>37,500 원</span></div>
        </div>
        <button class="pay-action-btn" onclick="showCardInsert()">카드 결제하기</button>
    </div>

    <!-- 5. 카드 삽입 모달 -->
    <div id="modal-card" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 3rem; margin-bottom: 20px;">IC 카드를 끝까지 밀어 넣어주세요</h2>
            <div class="card-insert-ani">💳 ⬇️</div>
            <p style="font-size: 2rem; color: #718096;">(결제가 진행중입니다. 잠시만 기다려주세요)</p>
        </div>
    </div>

    <!-- 6. 완료 화면 -->
    <div id="screen-done" class="screen" style="justify-content: center;">
        <div class="receipt">
            <h2 id="doneTitle" style="font-size: 3rem; margin-top: 0;">접수가 완료되었습니다</h2>
            <p id="doneSubText" style="font-size: 2rem;">선택 진료과: 내과</p>
            <p style="font-size: 1.5rem; margin-top: 30px;">대기번호</p>
            <div id="doneNumber" class="wait-number">105</div>
            <p class="print-msg">아래에서 출력된 용지를 챙겨가세요!</p>
        </div>
    </div>
</div>

<script>
    /* --- 상태 관리 --- */
    let currentFlow = ''; // '접수' 또는 '수납'
    let ssn = ''; // 입력된 주민번호 13자리
    let waitCount = 104; // 대기번호 카운터

    /* --- 화면 제어 함수 --- */
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        // 홈 화면일 경우 '처음으로' 버튼 숨기기
        if (screenId === 'screen-home') {
            document.getElementById('homeBtnContainer').style.display = 'none';
        } else if (screenId !== 'screen-done') { // 완료화면에서는 처음으로 버튼 굳이 필요없음
            document.getElementById('homeBtnContainer').style.display = 'block';
        }
    }

    function goHome() {
        ssn = '';
        currentFlow = '';
        updateSsnDisplay();
        showScreen('screen-home');
    }

    function startFlow(flowType) {
        currentFlow = flowType;
        ssn = '';
        updateSsnDisplay();
        showScreen('screen-ssn');
    }

    /* --- 주민번호 입력 로직 --- */
    function inputNumber(num) {
        if (ssn.length < 13) {
            ssn += num;
            updateSsnDisplay();
        }
    }

    function deleteNumber() {
        if (ssn.length > 0) {
            ssn = ssn.slice(0, -1);
            updateSsnDisplay();
        }
    }

    function updateSsnDisplay() {
        const display = document.getElementById('ssnDisplay');
        if (ssn.length === 0) {
            display.innerText = "주민등록번호 13자리 입력";
            display.style.color = "#a0aec0";
            return;
        }

        display.style.color = "#1a202c";
        let formatted = '';
        for (let i = 0; i < 13; i++) {
            if (i === 6) formatted += '- ';
            
            if (i < ssn.length) {
                // 뒷자리(7번째 인덱스부터) 첫자리를 제외하고 마스킹 처리
                if (i > 6 && i < 13) {
                    formatted += '* ';
                } else {
                    formatted += ssn[i] + ' ';
                }
            } else {
                formatted += '_ '; // 빈 자리 표시
            }
        }
        display.innerText = formatted;
    }

    function submitSsn() {
        if (ssn.length < 13) {
            alert("주민등록번호 13자리를 모두 입력해주세요.");
            return;
        }
        
        // 흐름에 따라 다음 화면 분기
        if (currentFlow === '접수') {
            showScreen('screen-dept');
        } else if (currentFlow === '수납') {
            showScreen('screen-payment');
        }
    }

    /* --- 진료 접수 완료 처리 --- */
    function completeRegistration(deptName) {
        waitCount++;
        document.getElementById('doneTitle').innerText = "진료 접수가 완료되었습니다";
        document.getElementById('doneSubText').innerText = `선택 진료과: ${deptName}`;
        document.getElementById('doneNumber').innerText = waitCount;
        
        showScreen('screen-done');
        finishFlow();
    }

    /* --- 수납 처리 및 카드 결제 시뮬레이션 --- */
    function showCardInsert() {
        const modal = document.getElementById('modal-card');
        modal.style.display = 'flex';

        // 3초 후 결제 완료 처리 (실제 카드 결제 승인 대기 시간 시뮬레이션)
        setTimeout(() => {
            modal.style.display = 'none';
            completePayment();
        }, 3000);
    }

    function completePayment() {
        waitCount++;
        document.getElementById('doneTitle').innerText = "수납이 완료되었습니다";
        document.getElementById('doneSubText').innerText = "처방전과 영수증이 출력됩니다.";
        document.getElementById('doneNumber').innerText = `접수번호: ${waitCount}`;
        
        showScreen('screen-done');
        finishFlow();
    }

    /* --- 완료 후 공통 초기화 로직 --- */
    function finishFlow() {
        document.getElementById('homeBtnContainer').style.display = 'none'; // 처음으로 버튼 숨김
        // 7초 후 자동으로 첫 화면 복귀
        setTimeout(() => {
            goHome();
        }, 7000);
    }

</script>

</body>
</html>
